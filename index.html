<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laila london fabrics</title>
    <!-- اضافه کردن فونت برای ظاهر بهتر (>لینک‌اختیاری) -->
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-color: #333;
        }

        body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;




    
    /* --- تغییرات اصلی اینجا 👇 --- */
    background-image: url('png3'); /* اسم عکس خودت رو اینجا بنویس */
    background-size: cover;      /* باعث میشه عکس کل صفحه رو بپوشونه */
    background-position: center; /* عکس رو وسط قرار میده */
    background-attachment: fixed; /* موقع اسکرول کردن، عکس ثابت می‌مونه */
    background-repeat: no-repeat; /* از تکرار عکس جلوگیری می‌کنه */
    /* -------------------------- */
    
    color: var(--text-color);
}


        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 15px;
            object-fit: cover;
            border: 3px solid white;
        }
        

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 25px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            text-decoration: none;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* رنگ‌بندی اختصاصی دکمه‌ها */
        .whatsapp { background-color: #25D366; }
        .google-maps { background-color: #EA4335; }
        .website { background-color: #2196F3; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- جایگذاری عکس پروفایل -->
       
        
        <h1>welcome</h1>
        <p>     laila londen fabric   </p>

        <div class="links-container">
            <!-- واتساپ -->
            <a href="https://wa.me/447903184031" class="link-card whatsapp" target="_blank">
                WhatsApp
            </a>

            <!-- گوگل مپ -->
            <a href="https://www.google.com/maps/place/Leila+London+Fabrics/@51.5279943,-0.2371182,114m/data=!3m1!1e3!4m6!3m5!1s0x487611261cdaf76d:0x613532ae949fa43b!8m2!3d51.5283641!4d-0.2365307!16s%2Fg%2F11rvk109s4?entry=ttu&g_ep=EgoyMDI2MDcxOS4wIKXMDSoASAFQAw%3D%3D"
             class="link-card google-maps" target="_blank">
                Google Maps
            </a>

            <!-- وب‌سایت -->
            <a href="https://www.leilafabrics.com/" class="link-card website" target="_blank">
                Website
            </a>

            <!-- اینستاگرام -->
            <a href="https://instagram.com/leilafabrics" class="link-card instagram" target="_blank">
                Instagram
            </a>
        </div>

        <footer>
            powerd by 3AS Teach
        </footer>
    </div>

</body>
</html>
